name = "chaincheck"
main = "src/index.js"
compatibility_date = "2024-09-23"

[assets]
directory = "./public"
binding = "ASSETS"

# ── Productie ─────────────────────────────────────────────────────────────────
[vars]
EXTERNAL_API_URL = "https://platform.marketingmadheads.com"
# EXTERNAL_API_KEY → secret: npx wrangler secret put EXTERNAL_API_KEY

# ── Lokale ontwikkeling (npm run dev) ─────────────────────────────────────────
[env.dev]
name = "chaincheck-dev"

[env.dev.vars]
EXTERNAL_API_URL = "http://localhost:4000"
# EXTERNAL_API_KEY → .dev.vars

[env.dev.assets]
directory = "./public"
binding = "ASSETS"
